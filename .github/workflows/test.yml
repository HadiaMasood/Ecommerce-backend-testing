name: Run Tests

# Trigger on every push to any branch
on:
  push:
    branches:
      - "**"

jobs:
  test:
    name: Integration Tests (Node + PostgreSQL)
    runs-on: ubuntu-latest

    # ── PostgreSQL service container ────────────────────────────────────────
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: 12345
          POSTGRES_DB: web_engineering_test_db
        ports:
          - 5432:5432
        # Wait until Postgres is healthy before running steps
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    # ── Steps ────────────────────────────────────────────────────────────────
    steps:
      # 1. Check out the repository code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Set up the Node.js version matching your local environment
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      # 3. Install all dependencies
      - name: Install dependencies
        working-directory: backend
        run: npm install

      # 4. Run the test suite
      #    Environment variables are injected here so no .env file is needed in CI.
      - name: Run tests
        working-directory: backend
        env:
          NODE_ENV: test

          # Test database (matches the service container above)
          TEST_DB_HOST: localhost
          TEST_DB_PORT: 5432
          TEST_DB_USERNAME: postgres
          TEST_DB_PASSWORD: 12345
          TEST_DB_NAME: web_engineering_test_db

          # Fallback vars used by the main data-source.js
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USERNAME: postgres
          DB_PASSWORD: 12345
          DB_NAME: web_engineering_test_db

          # JWT secrets (only needed so JWT middleware doesn't crash)
          JWT_SECRET: ci-test-access-secret
          JWT_REFRESH_SECRET: ci-test-refresh-secret

        run: npm test
